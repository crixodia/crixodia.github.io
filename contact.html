<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        /* 1. Reset and Variables */
        :root {
            /* Extracted Colors from Image */
            --bg-body: #0a0a0a;       /* Very dark background */
            --bg-card: #121212;       /* Slightly lighter card bg */
            --border-color: #2a2a2a;  /* Subtle borders */
            --text-main: #ffffff;     /* Bright white text */
            --text-sub: #888888;      /* Muted grey text */
            --accent: #f59e0b;        /* The Gold/Orange accent color */
            
            --radius-card: 12px;
            --radius-input: 6px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* 2. Main Layout */
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 3. The Card Container */
        .profile-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 2rem;
            width: 100%;
            max-width: 450px; /* Limits width similar to image */
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        /* Header styling to match "Cristian Bastidas" text style */
        .form-header {
            margin-bottom: 1.5rem;
        }
        
        .form-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .form-header p {
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        /* 4. Form Styling */
        form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        label {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            color: var(--text-sub);
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Input styling to match the dark aesthetic */
        input, textarea {
            background-color: #1a1a1a;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-input);
            padding: 12px;
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent); /* Subtle glow */
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        /* 5. The Button (Replicating the 'Share'/'Contact' buttons) */
        button {
            margin-top: 1rem;
            background-color: transparent;
            border: 1px solid var(--accent); /* Thin orange border */
            color: var(--accent);            /* Orange text */
            padding: 12px;
            border-radius: var(--radius-input);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: rgba(245, 158, 11, 0.1); /* Slight orange tint on hover */
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

    </style>
</head>
<body>

    <div class="profile-card">
        
        <div class="form-header">
            <h2>Get in Touch</h2>
            <p>Send me a message directly.</p>
        </div>

        <form action="https://formspree.io/f/xvodzdeq" method="POST">
            <label>
                Your Email
                <input type="email" name="email" placeholder="name@example.com" required>
            </label>
            
            <label>
                Your Message
                <textarea name="message" placeholder="Type your message here..." required></textarea>
            </label>
            
            <button type="submit">Send Message</button>
        </form>

    </div>

</body>
</html>
