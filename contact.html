<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        :root {
            --bg-body: #000;
            --bg-card: #141414;
            --border-color: #2a2a2a;
            --text-main: #ffffff;
            --text-sub: #ffffff;
            --text-muted: #888888;
            --accent: #ffae00;
            --radius-card: 5px;
            --radius-input: 5px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background-color: var(--bg-card);
            border-radius: var(--radius-card);
            padding: 2rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .form-header {
            margin-bottom: 1.5rem;
        }
        
        .form-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .form-header p {
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        label {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            color: var(--text-sub);
            font-size: 0.85rem;
            font-weight: 500;
        }

        input, textarea {
            background-color: #1a1a1a;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-input);
            padding: 12px;
            color: var(--text-main);
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        button {
            margin-top: 1rem;
            background-color: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px;
            border-radius: var(--radius-input);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: rgba(245, 158, 11, 0.1);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-return {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
            padding: 10px;
        }

        .btn-return:hover {
            color: var(--accent);
        }

    </style>
</head>
<body>
    <div class="profile-card">
        <div class="form-header">
            <h2>Get in Touch</h2>
        </div>
        
        <form action="https://formspree.io/f/xvodzdeq" method="POST">
            <label>
                Your Email
                <input type="email" name="email" placeholder="name@example.com" required>
            </label>
            <label>
                Your Message
                <textarea name="message" placeholder="Type your message here..." required></textarea>
            </label>
            <button type="submit">Send Message</button>
        </form>

        <a href="https://crixodia.com/" class="btn-return">
            &larr; Return to crixodia.com
        </a>

    </div>
</body>
</html>
